name: Sync fork

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to fork
        run: |
          git remote add fork https://x-access-token:${{ secrets.FORK_SYNC_TOKEN }}@github.com/${{ vars.FORK_REPO }}.git
          git push fork main:main
